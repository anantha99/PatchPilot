name: xarc

x-xarc-base: &xarc-base
  build:
    context: .
  working_dir: /workspace
  volumes:
    - .:/workspace
  environment:
    TMPDIR: /workspace/tmp
    TEMP: /workspace/tmp
    TMP: /workspace/tmp
    PYTEST_DEBUG_TEMPROOT: /workspace/tmp/pytest
    PATCHPILOT_PYTEST_NO_CAPTURE: "1"

services:
  xarc-test:
    <<: *xarc-base
    command: python -m pytest -q --capture=no

  xarc-smoke:
    <<: *xarc-base
    command: python -m patchpilot.cli eval --suite smoke --repo fixtures/buggy-python-repo --model-provider fake

  xarc-live-eval:
    <<: *xarc-base
    command: python -m patchpilot.cli eval --suite smoke --repo fixtures/mock-store-python --live-eval
    env_file:
      - .env

  xarc-shell:
    <<: *xarc-base
    command: bash
    stdin_open: true
    tty: true
